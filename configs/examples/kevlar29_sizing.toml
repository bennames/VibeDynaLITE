version = "2.0"

[material]
name = "Kevlar 29"
tensile_modulus_gpa = "71.0 GPa"  # Sourced from DuPont Tech Guide
failure_strain = 0.036
tensile_strength_gpa = "2.92 GPa" # Strength from literature
fiber_density_gcc = "1.44 g/cc"
areal_density_kgm2 = "0.47 kg/m2"
shear_ratio = 0.0004

[projectile]
mass_kg = "0.5 kg"
velocity_ms = "189.74 m/s"
blade_width_mm = "50.0 mm"
edge_thickness_mm = "2.0 mm"

[simulation]
mode = "A"
plies = 8
cfl = 0.8
boundary = "infinite"
safety_factor = 1.5

[damping]
model = "viscous"
coefficient = "auto"
