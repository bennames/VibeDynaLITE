version = "2.0"

[material]
name = "Custom"
tensile_modulus_gpa = 80.0  # Custom stiffness modulus
failure_strain = 0.03       # Custom ultimate failure strain limit
tensile_strength_gpa = 3.0  # Custom strength
fiber_density_gcc = 1.44
areal_density_kgm2 = 0.3
shear_ratio = 0.0004

[projectile]
mass_kg = 0.5
velocity_ms = 189.74
blade_width_mm = 50.0
edge_thickness_mm = 2.0

[simulation]
mode = "A"
plies = 4
cfl = 0.8
boundary = "infinite"
safety_factor = 1.5

[damping]
model = "viscous"
coefficient = "auto"
